<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teste de Velocidade da Internet</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0.4em 0 0.8em;
      font-size: 2.4rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .container {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.18);
      text-align: center;
    }

    .speed {
      font-size: 4.8rem;
      font-weight: bold;
      margin: 0.3em 0;
      line-height: 1;
    }

    .unit {
      font-size: 1.8rem;
      opacity: 0.8;
    }

    .type {
      font-size: 1.3rem;
      margin: 0.2em 0 1.2em;
      opacity: 0.9;
    }

    progress {
      width: 100%;
      height: 12px;
      margin: 1.5em 0;
      border-radius: 6px;
      background: rgba(255,255,255,0.15);
    }

    progress::-webkit-progress-bar {
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
    }

    progress::-webkit-progress-value {
      background: #00d4ff;
      border-radius: 6px;
      transition: width 0.4s ease;
    }

    button {
      background: #00d4ff;
      color: #0f1a3a;
      border: none;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      cursor: pointer;
      margin: 1.5rem 0.5rem 1rem;
      transition: all 0.25s;
      box-shadow: 0 6px 20px rgba(0,212,255,0.35);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,212,255,0.5);
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .info {
      font-size: 0.95rem;
      opacity: 0.75;
      margin-top: 2rem;
      line-height: 1.5;
    }

    .small {
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Teste de Velocidade</h1>

  <div id="result">
    <div class="speed" id="downloadSpeed">—</div>
    <div class="unit">Mbps</div>
    <div class="type">Download</div>

    <progress id="progress" value="0" max="100"></progress>

    <div class="speed" id="uploadSpeed">—</div>
    <div class="unit">Mbps</div>
    <div class="type">Upload</div>
  </div>

  <button id="startBtn">Iniciar Teste</button>
  <button id="stopBtn" disabled>Parar</button>

  <div class="info">
    <div id="status">Clique em "Iniciar Teste"</div>
    <div class="small" id="serverInfo"></div>
  </div>
</div>

<script>
// Configurações
const TEST_FILE_URL = "https://speed.cloudflare.com/__down?bytes=25000000"; // ~25 MB
const UPLOAD_URL    = "https://speed.cloudflare.com/__up";
const DOWNLOAD_SIZE = 25 * 1000 * 1000; // bytes

const startBtn = document.getElementById('startBtn');
const stopBtn  = document.getElementById('stopBtn');
const status   = document.getElementById('status');
const dlSpeed  = document.getElementById('downloadSpeed');
const ulSpeed  = document.getElementById('uploadSpeed');
const progress = document.getElementById('progress');
const serverInfo = document.getElementById('serverInfo');

let abortController = null;
let testRunning = false;

startBtn.onclick = async () => {
  if (testRunning) return;

  testRunning = true;
  startBtn.disabled = true;
  stopBtn.disabled = false;
  status.textContent = "Preparando teste...";
  dlSpeed.textContent = "—";
  ulSpeed.textContent = "—";
  progress.value = 0;

  abortController = new AbortController();

  try {
    // 1. Teste de Download
    status.textContent = "Medindo DOWNLOAD...";
    const dlResult = await measureDownload();
    dlSpeed.textContent = dlResult.toFixed(2);

    // 2. Teste de Upload (pequeno para não consumir muito dados)
    status.textContent = "Medindo UPLOAD...";
    const ulResult = await measureUpload();
    ulSpeed.textContent = ulResult.toFixed(2);

    status.textContent = "Teste concluído!";
  } catch (err) {
    if (err.name === 'AbortError') {
      status.textContent = "Teste interrompido.";
    } else {
      status.textContent = "Erro: " + (err.message || "falha na conexão");
      console.error(err);
    }
  } finally {
    testRunning = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    progress.value = 0;
  }
};

stopBtn.onclick = () => {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
};

async function measureDownload() {
  const startTime = performance.now();
  const signal = abortController.signal;

  const response = await fetch(TEST_FILE_URL, { signal, cache: "no-store" });
  const reader = response.body.getReader();
  let received = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    received += value.length;

    // Atualiza barra de progresso aproximada
    const percent = Math.min(100, (received / DOWNLOAD_SIZE) * 100 * 1.3);
    progress.value = percent;
  }

  const endTime = performance.now();
  const durationSec = (endTime - startTime) / 1000;

  // Mbps = (bytes * 8) / (segundos * 1_000_000)
  return (received * 8) / (durationSec * 1_000_000);
}

async function measureUpload() {
  // Criamos ~5 MB de dados aleatórios
  const size = 5 * 1000 * 1000;
  const data = new Uint8Array(size);
  crypto.getRandomValues(data);

  const blob = new Blob([data]);
  const startTime = performance.now();

  const signal = abortController.signal;

  const response = await fetch(UPLOAD_URL, {
    method: 'POST',
    body: blob,
    signal,
    mode: 'cors',
    cache: 'no-store'
  });

  const endTime = performance.now();
  const durationSec = (endTime - startTime) / 1000;

  return (size * 8) / (durationSec * 1_000_000);
}

// Mostra informação do servidor (opcional)
fetch("https://speed.cloudflare.com/meta")
  .then(r => r.json())
  .then(data => {
    if (data.client) {
      serverInfo.textContent = `Servidor: ${data.client.colo || '?'} • Seu IP: ${data.client.ip || '—'}`;
    }
  })
  .catch(() => {});

</script>

</body>
</html>
